<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Expense Tracker</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: #F7F3EA;
            background-image:
                linear-gradient(rgba(27, 42, 47, 0.03) 1px, transparent 1px);
            background-size: 100% 28px;
            color: #1B2A2F;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        .card {
            max-width: 480px;
            width: 100%;
            text-align: center;
            padding: 56px 40px;
        }

        .eyebrow {
            font-size: 12px;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: #8A8275;
            margin-bottom: 18px;
            font-weight: 600;
        }

        h1 {
            font-family: Georgia, 'Times New Roman', serif;
            font-size: 42px;
            font-weight: 400;
            line-height: 1.15;
            color: #1B2A2F;
            margin-bottom: 14px;
        }

        .underline {
            width: 64px;
            height: 3px;
            background-color: #B8860B;
            margin: 0 auto 28px;
            border-radius: 2px;
        }

        p.tagline {
            font-size: 16px;
            color: #4A4A45;
            line-height: 1.6;
            margin-bottom: 36px;
        }

        .btn {
            display: inline-block;
            padding: 14px 36px;
            background-color: #1B2A2F;
            color: #F7F3EA;
            text-decoration: none;
            font-size: 15px;
            font-weight: 600;
            letter-spacing: 0.5px;
            border-radius: 4px;
            transition: background-color 0.2s ease, transform 0.15s ease;
        }

        .btn:hover {
            background-color: #B8860B;
            transform: translateY(-1px);
        }

        .btn:focus-visible {
            outline: 2px solid #B8860B;
            outline-offset: 3px;
        }

        .footnote {
            margin-top: 40px;
            font-size: 12px;
            color: #A39E91;
            letter-spacing: 0.5px;
        }

        @media (prefers-reduced-motion: reduce) {
            .btn {
                transition: none;
            }
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="eyebrow">Personal Finance</div>
        <h1>The AI Expense Tracker</h1>
        <div class="underline"></div>
        <p class="tagline">Log what you spend. Let the numbers tell you where it actually goes — and what to do about it.</p>
        <a class="btn" href="/dashboard">Open Dashboard</a>
        <div class="footnote">Every entry adds up to the full picture</div>
    </div>
</body>
</html>
